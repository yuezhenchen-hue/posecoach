name: PoseCoach
options:
  bundleIdPrefix: com.posecoach
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 6
    ALWAYS_SEARCH_USER_PATHS: NO

targets:
  PoseCoach:
    type: application
    platform: iOS
    sources:
      - path: PoseCoach
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: PoseCoach/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yuezhenchen.smartposecam
        PRODUCT_NAME: PoseCoach
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: minimal
    info:
      path: PoseCoach/Resources/Info.plist
      properties:
        CFBundleDisplayName: 智拍指南
        CFBundleName: 智拍指南
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "智拍指南需要访问相机来提供实时拍照指导，包括构图建议、姿势引导和光线分析"
        NSPhotoLibraryAddUsageDescription: "智拍指南需要保存拍摄的照片到你的相册"
        NSPhotoLibraryUsageDescription: "智拍指南需要访问相册以选择参考照片用于「照着拍」功能"
        NSMicrophoneUsageDescription: "智拍指南可能需要麦克风来录制视频"

  PoseCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PoseCoachTests
    dependencies:
      - target: PoseCoach
