name: PoseCoach
options:
  bundleIdPrefix: com.posecoach
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""

targets:
  PoseCoach:
    type: application
    platform: iOS
    sources:
      - path: PoseCoach
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: PoseCoach/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.posecoach.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: false
    info:
      path: PoseCoach/Resources/Info.plist
      properties:
        CFBundleDisplayName: PoseCoach
        CFBundleName: PoseCoach
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "PoseCoach 需要访问相机来提供实时拍照指导，包括构图建议、姿势引导和光线分析"
        NSPhotoLibraryAddUsageDescription: "PoseCoach 需要保存拍摄的照片到你的相册"
        NSPhotoLibraryUsageDescription: "PoseCoach 需要访问相册以选择参考照片用于「照着拍」功能"
        NSMicrophoneUsageDescription: "PoseCoach 可能需要麦克风来录制视频"

  PoseCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PoseCoachTests
    dependencies:
      - target: PoseCoach
